<!DOCTYPE html><html lang="zh-CN" oncontextmenu="self.event.returnValue=false" onselectstart="return false"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"><title>默契大考验</title><style>*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Helvetica Neue",sans-serif;background:linear-gradient(135deg,#ffecd2 0%,#fcb69f 100%);min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px}.ctnr{width:100%;max-width:420px;background:#fff;border-radius:20px;box-shadow:0 10px 40px rgba(0,0,0,0.1);overflow:hidden;min-height:580px;position:relative}.page{display:none;padding:30px 24px;min-height:580px;flex-direction:column}.page.actv{display:flex}.tppg{justify-content:center;align-items:center;text-align:center}.tpic{font-size:60px;margin-bottom:20px}.tptx{font-size:16px;color:#666;line-height:1.6}.nkpg{justify-content:center}.pttl{font-size:24px;font-weight:bold;color:#333;text-align:center;margin-bottom:10px}.ptsb{font-size:14px;color:#999;text-align:center;margin-bottom:40px}.nkip{width:100%;height:50px;border:2px solid #e0e0e0;border-radius:25px;padding:0 20px;font-size:16px;outline:none;transition:border-color 0.3s;margin-bottom:30px}.nkip:focus{border-color:#4a90e2}.stbt{width:100%;height:50px;background:linear-gradient(135deg,#4a90e2,#357abd);color:#fff;border:none;border-radius:25px;font-size:16px;font-weight:500;cursor:pointer;transition:transform 0.2s,box-shadow 0.2s}.stbt:active{transform:scale(0.98)}.stbt:disabled{opacity:0.5;cursor:not-allowed}.qzpg{justify-content:space-between}.qzhd{margin-bottom:20px}.qzix{font-size:14px;color:#4a90e2;margin-bottom:10px;font-weight:500}.qztc{font-size:18px;color:#333;line-height:1.6;font-weight:500}.opcc{flex:1;display:flex;flex-direction:column;gap:12px;margin:20px 0}.opit{padding:16px 20px;border:2px solid #e8e8e8;border-radius:12px;cursor:pointer;transition:all 0.2s;font-size:15px;color:#333;background:#fff}.opit:hover{border-color:#4a90e2}.opit.slct{border-color:#4a90e2;background:#f0f7ff;color:#4a90e2}.btgp{display:flex;gap:10px;padding-bottom:20px}.pvbt{flex:0 0 40%;height:48px;background:#fff;color:#4a90e2;border:2px solid #4a90e2;border-radius:24px;font-size:15px;font-weight:500;cursor:pointer;transition:all 0.2s}.pvbt:active{background:#f0f7ff}.pvbt:disabled{opacity:0.4;cursor:not-allowed}.nxbt{flex:0 0 60%;height:48px;background:linear-gradient(135deg,#4a90e2,#357abd);color:#fff;border:none;border-radius:24px;font-size:15px;font-weight:500;cursor:pointer;transition:all 0.2s}.nxbt:active{transform:scale(0.98)}.nxbt:disabled{opacity:0.5;cursor:not-allowed}.rspg{align-items:center}.rshd{text-align:center;margin-bottom:30px}.rstl{font-size:20px;color:#333;margin-bottom:5px}.rssb{font-size:13px;color:#999}.avct{display:flex;align-items:center;justify-content:center;margin:30px 0;width:100%}.avbx{display:flex;flex-direction:column;align-items:center;flex:1}.avtr{width:70px;height:70px;border-radius:50%;background:linear-gradient(135deg,#ffecd2,#fcb69f);display:flex;align-items:center;justify-content:center;font-size:30px;margin-bottom:8px;border:3px solid #fff;box-shadow:0 4px 15px rgba(0,0,0,0.1)}.avnm{font-size:13px;color:#666;max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.htct{display:flex;flex-direction:column;align-items:center;padding:0 10px}.htic{font-size:36px;color:#ff6b6b;margin-bottom:5px;animation:hbta 1.5s ease-in-out infinite}@keyframes hbta{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}.sctc{font-size:28px;font-weight:bold;color:#ff6b6b}.sclb{font-size:12px;color:#999}.rscc{text-align:center;font-size:15px;color:#666;margin:20px 0 30px;line-height:1.6}.rsbt{display:flex;gap:12px;width:100%;margin-top:auto;padding-bottom:10px}.rsbn{flex:1;height:44px;border-radius:22px;font-size:14px;font-weight:500;cursor:pointer;transition:all 0.2s}.vabt{background:#fff;color:#4a90e2;border:2px solid #4a90e2}.rtbt{background:linear-gradient(135deg,#4a90e2,#357abd);color:#fff;border:none}.mdov{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);display:none;justify-content:center;align-items:center;z-index:1000;padding:20px}.mdov.show{display:flex}.mdal{background:#fff;border-radius:16px;padding:30px 24px;width:100%;max-width:320px}.mdtl{font-size:18px;font-weight:bold;color:#333;text-align:center;margin-bottom:20px}.mdip{width:100%;height:46px;border:2px solid #e0e0e0;border-radius:23px;padding:0 20px;font-size:16px;outline:none;margin-bottom:20px;text-align:center;letter-spacing:3px}.mdip:focus{border-color:#4a90e2}.mdbt{display:flex;gap:10px}.mdbn{flex:1;height:42px;border-radius:21px;font-size:14px;cursor:pointer;transition:all 0.2s}.mdcl{background:#f5f5f5;color:#666;border:none}.mdcf{background:linear-gradient(135deg,#4a90e2,#357abd);color:#fff;border:none}.awpg .awit{padding:15px 0;border-bottom:1px solid #f0f0f0}.awpg .awit:last-child{border-bottom:none}.awqu{font-size:14px;color:#333;margin-bottom:8px;font-weight:500}.awcr{font-size:13px;color:#52c41a;margin-bottom:4px}.awus{font-size:13px;color:#999}.awus.wrng{color:#ff4d4f}.bkbt{width:100%;height:44px;background:linear-gradient(135deg,#4a90e2,#357abd);color:#fff;border:none;border-radius:22px;font-size:15px;cursor:pointer;margin-top:20px}.tstc{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,0.75);color:#fff;padding:12px 24px;border-radius:8px;font-size:14px;z-index:2000;display:none;max-width:80%;text-align:center}.tstc.show{display:block;animation:fdin 0.3s}@keyframes fdin{from{opacity:0}to{opacity:1}}.awlc{flex:1;overflow-y:auto;margin:10px 0}</style></head><body><div class="ctnr"><div class="page tppg" id="wtpd"><div class="tpic">💬</div>
<div class="tptx">请在微信客户端中打开此页面<br>参与默契大考验</div></div><div class="page nkpg" id="nkpd"><div><div class="pttl">默契大考验</div><div class="ptsb">输入你的昵称，开始答题吧</div></div><input type="text" class="nkip" id="nkin" placeholder="请输入你的昵称" maxlength="20"><button class="stbt" id="stbn" onclick="startQuiz()">开始答题</button></div><div class="page qzpg" id="qzpd"><div class="qzhd"><div class="qzix" id="qzin">第 1 题 / 共 10 题</div><div class="qztc" id="qztx"></div></div><div class="opcc" id="opct"></div><div class="btgp"><button class="pvbt" id="pvbn" onclick="prevQuestion()" disabled>上一题</button><button class="nxbt" id="nxbn" onclick="nextQuestion()">下一题</button></div></div><div class="page rspg" id="rspd"><div class="rshd"><div class="rstl">答题完成！</div><div class="rssb">来看看你们的默契度吧</div></div><div class="avct"><div class="avbx"><div class="avtr">👤</div><div class="avnm" id="uanm">你</div></div><div class="htct"><div class="htic">❤️</div><div class="sctc" id="sctx">0%</div><div class="sclb">默契度</div></div><div class="avbx"><div class="avtr">✨</div><div class="avnm">出题人</div></div></div><div class="rscc" id="rsct"></div><div class="rsbt"><button class="rsbn vabt" onclick="showPwdModal('view')">查看答案</button><button class="rsbn rtbt" onclick="showPwdModal('retry')">重新答题</button></div></div><div class="page awpg" id="awpd" style="flex-direction:column;"><div class="pttl" style="font-size:20px;margin-bottom:15px;">答案详情</div><div class="awlc" id="awls"></div><button class="bkbt" onclick="backToResult()">返回结果</button></div></div><div class="mdov" id="pwmd"><div class="mdal"><div class="mdtl" id="pmtl">请输入密码</div><input type="text" class="mdip" id="pwin" placeholder="请输入8位密码" maxlength="8"><div class="mdbt"><button class="mdbn mdcl" onclick="hidePwdModal()">取消</button><button class="mdbn mdcf" onclick="confirmPwd()">确认</button></div></div></div><div class="tstc" id="tost"></div>
<script>const questions=[{question:"我最喜欢的颜色是？",options:["红色","蓝色","绿色","黑色"],answer:1},{question:"我的生日是哪个月份？",options:["1-3月","4-6月","7-9月","10-12月"],answer:1},{question:"我有暗恋的人吗？",options:["有","没有"],answer:0},{question:"和女生聊天我会害羞吗？",options:["会","不会"],answer:0},{question:"我最想去旅游的城市是？",options:["北京","上海","成都","三亚"],answer:2},{question:"我的性格更偏向于？",options:["外向活泼","内向安静","慢热型","随性多变"],answer:1},{question:"我喜欢用什么输入法",options:["九宫格","26键","14键","语音"],answer:2},{question:"我平时喜欢喝什么饮料",options:["白开水","可乐","果汁","咖啡"],answer:2},{question:"我更喜欢哪种类型的音乐？",options:["流行","摇滚","民谣","电子"],answer:0},{question:"我最想做的事？",options:["去看日出","去滑雪","去冲浪","去爬山"],answer:1}];const SEED_S=201314n,TIME_STEP=1800n,API_BASE="https://api.chuckfang.com/1314520/%e6%96%b0%e7%94%a8%e6%88%b7%e5%ae%8c%e6%88%90%e7%ad%94%e9%a2%98/";let currentQuestion=0,userAnswers=new Array(questions.length).fill(-1),username="",finalScore=0,pwdMode='view';function showToast(msg,duration=2000){const toast=document.getElementById('tost');toast.textContent=msg;toast.classList.add('show');setTimeout(()=>{toast.classList.remove('show')},duration)}function showPage(pageId){document.querySelectorAll('.page').forEach(p=>p.classList.remove('actv'));document.getElementById(pageId).classList.add('actv')}function isWechat(){const ua=navigator.userAgent.toLowerCase();return ua.indexOf('micromessenger')!==-1}function isDebugMode(){return window.location.search.indexOf('debug')!==-1}function genDynamicPwd(utcTimestamp){const ts=BigInt(Math.floor(utcTimestamp));const T=ts/TIME_STEP;let tmp=(T*7621n+SEED_S*4513n)^(T<<3n);tmp=tmp*3131n^(SEED_S>>2n);let code=tmp<0n?-tmp:tmp;code=code%100000000n;return code.toString().padStart(8,'0')}function getCurrentPwd(){const nowSeconds=Date.now()/1000;return genDynamicPwd(nowSeconds)}function reverseString(str){return str.split('').reverse().join('')}function verifyPassword(input,mode){const viewPwd=getCurrentPwd();if(mode==='view'){return input===viewPwd}else{return input===reverseString(viewPwd)}}function showPwdModal(mode){pwdMode=mode;document.getElementById('pmtl').textContent=mode==='view'?'请输入查看答案密码':'请输入重新答题密码';document.getElementById('pwin').value='';document.getElementById('pwmd').classList.add('show');document.getElementById('pwin').focus()}function hidePwdModal(){document.getElementById('pwmd').classList.remove('show')}function confirmPwd(){const input=document.getElementById('pwin').value.trim();if(input.length!==8){showToast('请输入8位密码');return}if(verifyPassword(input,pwdMode)){hidePwdModal();if(pwdMode==='view'){showAnswers()}else{retryQuiz()}}else{showToast('密码错误，请重试')}}function startQuiz(){const input=document.getElementById('nkin');username=input.value.trim();if(!username){showToast('请输入你的昵称');return}currentQuestion=0;userAnswers=new Array(questions.length).fill(-1);renderQuestion();showPage('qzpd')}function renderQuestion(){const q=questions[currentQuestion];document.getElementById('qzin').textContent=`第 ${currentQuestion+1} 题 / 共 ${questions.length} 题`;document.getElementById('qztx').textContent=q.question;const container=document.getElementById('opct');container.innerHTML='';q.options.forEach((opt,idx)=>{const div=document.createElement('div');div.className='opit';if(userAnswers[currentQuestion]===idx){div.classList.add('slct')}div.textContent=opt;div.onclick=()=>selectOption(idx);container.appendChild(div)});document.getElementById('pvbn').disabled=currentQuestion===0;const nextBtn=document.getElementById('nxbn');if(currentQuestion===questions.length-1){nextBtn.textContent='提交'}else{nextBtn.textContent='下一题'}}function selectOption(idx){userAnswers[currentQuestion]=idx;const options=document.querySelectorAll('.opit');options.forEach((opt,i)=>{opt.classList.toggle('slct',i===idx)});setTimeout(()=>{if(currentQuestion<questions.length-1){currentQuestion++;renderQuestion()}},300)}function prevQuestion(){if(currentQuestion>0){currentQuestion--;renderQuestion()}}function nextQuestion(){if(userAnswers[currentQuestion]===-1){showToast('请先选择一个选项');return}if(currentQuestion<questions.length-1){currentQuestion++;renderQuestion()}else{submitQuiz()}}function calculateScore(){let correct=0;for(let i=0;i<questions.length;i++){if(userAnswers[i]===questions[i].answer){correct++}}return Math.round((correct/questions.length)*100)}function getScoreComment(score){if(score>=90)return"全世界你最懂我~";if(score>=70)return"默契度再高一点，我就跟你走~";if(score>=50)return"你保住了咱俩的革命友谊！";if(score>=30)return"友谊的小船说翻就翻~";return"你我本无缘，全靠朋友圈"}function submitQuiz(){finalScore=calculateScore();const chosenStr=userAnswers.join('');const rawString=`user-${username}-score-${finalScore}-chosen-${chosenStr}`;const encodedString=encodeURIComponent(rawString);const apiUrl=API_BASE+encodedString;fetch(apiUrl).then(response=>response.json()).then(data=>{if(data.status!==200){showToast('结果上传失败：'+(data.msg||'未知错误'))}}).catch(err=>{showToast('结果上传失败，请检查网络')});localStorage.setItem('quiz_done','1');localStorage.setItem('quiz_score',finalScore.toString());localStorage.setItem('quiz_username',username);showResult()}function showResult(){document.getElementById('sctx').textContent=finalScore+'%';document.getElementById('uanm').textContent=username;document.getElementById('rsct').textContent=getScoreComment(finalScore);showPage('rspd')}function showAnswers(){const list=document.getElementById('awls');list.innerHTML='';questions.forEach((q,idx)=>{const item=document.createElement('div');item.className='awit';const userOpt=userAnswers[idx]>=0?q.options[userAnswers[idx]]:'未作答';const correctOpt=q.options[q.answer];const isCorrect=userAnswers[idx]===q.answer;item.innerHTML=`<div class="awqu">${idx+1}. ${q.question}</div><div class="awcr">正确答案：${correctOpt}</div><div class="awus ${isCorrect?'':'wrng'}">你的答案：${userOpt}</div>`;list.appendChild(item)});showPage('awpd')}function backToResult(){showPage('rspd')}function retryQuiz(){localStorage.removeItem('quiz_done');localStorage.removeItem('quiz_score');localStorage.removeItem('quiz_username');currentQuestion=0;userAnswers=new Array(questions.length).fill(-1);username="";document.getElementById('nkin').value='';showPage('nkpd');showToast('已重置，可以重新答题了')}function init(){if(!isDebugMode()&&!isWechat()){showPage('wtpd');return}if(localStorage.getItem('quiz_done')==='1'){finalScore=parseInt(localStorage.getItem('quiz_score'))||0;username=localStorage.getItem('quiz_username')||'匿名用户';userAnswers=new Array(questions.length).fill(-1);showResult()}else{showPage('nkpd')}document.getElementById('pwin').addEventListener('keypress',function(e){if(e.key==='Enter'){confirmPwd()}});document.getElementById('pwin').addEventListener('input',function(e){this.value=this.value.replace(/[^0-9]/g,'')})}init();</script></body></html>
