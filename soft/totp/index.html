<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><title>TOTP 生成器 Beta</title><script src="https://cdn.jsdelivr.net/npm/crypto-js@4.2.0/crypto-js.min.js"></script><style>body{font-family:system-ui;padding:30px;max-width:620px;}.box{margin:14px 0;}#secretInput{width:340px;padding:7px;font-size:16px;}button{padding:7px 14px;cursor:pointer;margin:0 5px;border:none;background:#f8f8f8;border-radius:4px;}button:active{background:#eee;}#totpResult{font-size:40px;color:#d93025;font-weight:bold;letter-spacing:8px;display:block;margin:10px 0;}.progress-wrap{width:100%;height:8px;background-color:#e5e5e5;border-radius:4px;overflow:hidden;margin-bottom:12px;}#progress-bar{height:100%;background-color:#d93025;transition:width 0.3s linear;}.prev-next{font-size:14px;color:#999;margin-top:8px;}.tip{color:#666;font-size:13px;margin-top:14px;line-height:1.5;}#fileInput{display:none;}.copy-btn{margin-top:10px;}.copy-tip{color:#666;font-size:12px;margin-top:5px;display:none;}.drag-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(217,48,37,0.1);border:2px dashed #d93025;z-index:9999;display:none;justify-content:center;align-items:center;font-size:24px;color:#d93025;pointer-events:none;}.drag-hint{margin-top:10px;font-size:12px;color:#666;}</style></head><body><div class="drag-overlay" id="dragOverlay">释放文件导入密钥</div><h2>TOTP 动态验证码生成器</h2><div style="color:rgba(255, 0, 0, 0.949)">Beta</div><div class="box"><label>密钥：</label><input id="secretInput" type="password" placeholder="输入密钥" value=""><br><button onclick="exportEncryptedKeyFile()" style="background-color: #ffae00; color: #fff;">💾导出密钥文件</button><button onclick="triggerImport()" style="background-color: #25d9b2; color: #fff;">📂导入密钥文件</button><input type="file" id="fileInput" accept=".totp-key" onchange="readKeyFile(event)"><div class="drag-hint">💡 也可直接将 .totp-key 文件拖拽到窗口任意位置</div></div>
<div>当前验证码：<span id="totpResult">---</span></div><div class="progress-wrap"><div id="progress-bar" style="width:100%"></div></div>
<button class="copy-btn" onclick="copyCurrentCode()" style="background-color: #2f2fff; color: #fff;">📋复制当前验证码<div class="copy-tip" id="copyTip" style=" color: #fff;">✅ 复制成功！</div></button>
<div class="prev-next">上一期：<span id="prevCode">-</span> &nbsp;&nbsp; 下一期：<span id="nextCode">-</span></div>
<div class="tip">每秒自动刷新 | 密钥AES加密存储 | 本地缓存加密密钥</div>
<div class="tip"style="color:red;">本工具仍处于测试阶段，请妥善保管原始密钥，以免因工具改版导致密钥丢失</div>
<div class="tip">请勿只保存密钥导出文件，导出的文件采用加密保存，一旦程序密钥丢失，导出文件将无法解密</div>
<script>function base32Decode(input){const alphabet="ABCDEFGHIJKLMNOPQRSTUVWXYZ234567";let str=input.toUpperCase().replace(/=/g,"");let binary="";for(const c of str){const idx=alphabet.indexOf(c);if(idx===-1)throw new Error("非法Base32字符");binary+=idx.toString(2).padStart(5,"0");}const bytes=[];for(let i=0;i+8<=binary.length;i+=8){bytes.push(parseInt(binary.slice(i,i+8),2));}return Uint8Array.from(bytes);}function packUint64BE(num){const buf=new ArrayBuffer(8);const dv=new DataView(buf);dv.setBigUint64(0,BigInt(num),false);return new Uint8Array(buf);}function wordArrayToUint8Array(wordArr){const words=wordArr.words;const sigBytes=wordArr.sigBytes;const arr=new Uint8Array(sigBytes);for(let i=0;i<sigBytes;i++){const word=words[i>>>2];const shift=(3-(i&3))<<3;arr[i]=(word>>>shift)&0xff;}return arr;}function calcTOTP(secret,step,interval=30){const keyBytes=base32Decode(secret);const timeBuf=packUint64BE(step);const keyWA=CryptoJS.lib.WordArray.create(keyBytes);const msgWA=CryptoJS.lib.WordArray.create(timeBuf);const hmacWA=CryptoJS.HmacSHA1(msgWA,keyWA);const hmacHash=wordArrayToUint8Array(hmacWA);const offset=hmacHash[hmacHash.length-1]&0x0f;const b1=hmacHash[offset];const b2=hmacHash[offset+1];const b3=hmacHash[offset+2];const b4=hmacHash[offset+3];let code=((b1&0x7f)<<24)|(b2<<16)|(b3<<8)|b4;const otp=code%1000000;return otp.toString().padStart(6,"0");}function getNowStep(interval=30){const ts=Math.floor(Date.now()/1000);return Math.floor(ts/interval);}function getRemainSec(interval=30){const ts=Math.floor(Date.now()/1000);return interval-(ts%interval);}const STORAGE_SALT="TOTP_SALT_FIX_2026";const LOCAL_STORAGE_KEY="encrypted_totp_secret";function aesEncrypt(text){return CryptoJS.AES.encrypt(text,STORAGE_SALT).toString();}function aesDecrypt(cipher){try{const wa=CryptoJS.AES.decrypt(cipher,STORAGE_SALT);return wa.toString(CryptoJS.enc.Utf8);}catch{return null;}}function saveEncryptedSecretToLocal(secret){if(!secret)return;const encrypted=aesEncrypt(secret);localStorage.setItem(LOCAL_STORAGE_KEY,encrypted);}function getDecryptedSecretFromLocal(){const encrypted=localStorage.getItem(LOCAL_STORAGE_KEY);if(!encrypted)return null;return aesDecrypt(encrypted);}function exportEncryptedKeyFile(){const val=document.getElementById("secretInput").value.trim();if(!val)return alert("密钥不能为空");const encryptedStr=aesEncrypt(val);const blob=new Blob([encryptedStr],{type:"text/plain"});const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download="totp-secret.totp-key";document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);}function triggerImport(){document.getElementById("fileInput").click();}function processKeyFile(file){if(!file)return;if(!file.name.endsWith(".totp-key")){alert("请选择后缀为 .totp-key 的密钥文件");return false;}const reader=new FileReader();reader.onload=function(e){const cipherText=e.target.result.trim();const plainSecret=aesDecrypt(cipherText);if(!plainSecret){alert("文件解密失败，文件损坏或不是本工具导出的密钥");return;}document.getElementById("secretInput").value=plainSecret;saveEncryptedSecretToLocal(plainSecret);renderAll();};reader.onerror=function(){alert("文件读取失败，请重试");};reader.readAsText(file);return true;}function readKeyFile(event){const file=event.target.files[0];processKeyFile(file);event.target.value="";}function copyCurrentCode(){const code=document.getElementById("totpResult").textContent.trim();if(code.length!==6||isNaN(code)){return;}navigator.clipboard.writeText(code).then(()=>{const copyTip=document.getElementById("copyTip");copyTip.style.display="block";setTimeout(()=>copyTip.style.display="none",2000);}).catch(()=>{const input=document.createElement("input");input.value=code;document.body.appendChild(input);input.select();document.execCommand("copy");document.body.removeChild(input);const copyTip=document.getElementById("copyTip");copyTip.style.display="block";setTimeout(()=>copyTip.style.display="none",2000);});}let dragCounter=0;function initDragDrop(){const dragOverlay=document.getElementById("dragOverlay");const body=document.body;["dragenter","dragover","dragleave","drop"].forEach(eventName=>{body.addEventListener(eventName,(e)=>{e.preventDefault();e.stopPropagation();});});body.addEventListener("dragenter",()=>{dragCounter++;dragOverlay.style.display="flex";});body.addEventListener("dragleave",()=>{dragCounter--;if(dragCounter<=0){dragOverlay.style.display="none";dragCounter=0;}});body.addEventListener("drop",(e)=>{dragCounter=0;dragOverlay.style.display="none";const files=e.dataTransfer.files;if(files.length>0){processKeyFile(files[0]);}});}function initSecretInputListener(){const secretInput=document.getElementById("secretInput");secretInput.addEventListener("input",function(){const val=this.value.trim();saveEncryptedSecretToLocal(val);});}let refreshTimer=null;const AUTO_REFRESH_MS=1000;const TOTP_STEP_SEC=30;function renderAll(){const secret=document.getElementById("secretInput").value.trim();const domCode=document.getElementById("totpResult");const domProgress=document.getElementById("progress-bar");const domPrev=document.getElementById("prevCode");const domNext=document.getElementById("nextCode");const remain=getRemainSec(TOTP_STEP_SEC);const percent=(remain/TOTP_STEP_SEC)*100;domProgress.style.width=percent+"%";if(!secret){domCode.textContent="请输入/导入密钥";domPrev.textContent="-";domNext.textContent="-";return;}try{const currStep=getNowStep(TOTP_STEP_SEC);const curr=calcTOTP(secret,currStep);const prev=calcTOTP(secret,currStep-1);const next=calcTOTP(secret,currStep+1);domCode.textContent=curr;domPrev.textContent=prev;domNext.textContent=next;}catch(err){domCode.textContent="错误："+err.message;domPrev.textContent="-";domNext.textContent="-";}}function startAutoUpdate(){const savedSecret=getDecryptedSecretFromLocal();if(savedSecret){document.getElementById("secretInput").value=savedSecret;}renderAll();refreshTimer=setInterval(renderAll,AUTO_REFRESH_MS);}window.onload=()=>{startAutoUpdate();initDragDrop();initSecretInputListener();}</script></body></html>
